name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: amd64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
          cache: true
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          VERSION="${GITHUB_REF_NAME}"
          go build \
            -trimpath \
            -ldflags "-s -w -X github.com/gunwooko/devx/cmd.version=${VERSION}" \
            -o "dist/devx_${VERSION}_${GOOS}_${GOARCH}" .
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
